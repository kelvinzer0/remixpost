name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Check PHP syntax (all files)
        run: |
          find app/ config/ routes/ database/ -name "*.php" -exec php -l {} \; 2>&1
          echo "✓ All PHP files pass syntax check"

      - name: Verify all classes referenced in use statements exist
        run: |
          EXIT_CODE=0
          for cls in $(grep -rhE "^use App\\\\" app/ 2>/dev/null | sed "s/use App\\\\//;s/;//" | sort -u); do
            filepath="app/$(echo $cls | tr '\\' '/').php"
            if [ ! -f "$filepath" ]; then
              echo "✗ MISSING: App\\$cls → expected at $filepath"
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/remixpost
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
